<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>benjaminyzg's Portfolio Hub</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        // --- 1. DEFINE YOUR INDIVIDUAL PAGES ---

        function HomePage() {
            return (
                <div>
                    <h2>🏠 Welcome & Overview</h2>
                    <p style={{ fontSize: '1.1rem', lineHeight: '1.7' }}>
                        Hi there, I'm Benjamin 👋 Welcome to my GitHub profile hub! 
                        I am a passionate developer focused on building innovative, low-latency architectures and utilizing structured CI/CD environments for software delivery.
                    </p>
                    
                    <div style={{ marginTop: '20px', padding: '15px', backgroundColor: '#f8f9fa', borderRadius: '6px', borderLeft: '4px solid #0366d6' }}>
                        <p style={{ margin: 0, fontStyle: 'italic', color: '#555' }}>
                            "New to GitHub, and I'm trying to figure how to use this platform correctly and appropriately for both work and testing. 
                            I believe that this is a tool that is necessary, or a basic requirement for a lot of technology companies, 
                            particularly in the software development space doing CI/CD development. Some of the repositories might be configured 
                            and inappropriately configured and implemented -> do let me know via email."
                        </p>
                    </div>
                </div>
            );
        }

        function ProjectsPage() {
            return (
                <div>
                    <h2>🚀 Projects Portfolio</h2>
                    <p style={{ fontSize: '1.1rem', lineHeight: '1.7' }}>
                        This section showcases my engineering work, constraint-driven system topologies, and proprietary software builds.
                    </p>
                    
                    <div style={{ background: '#fff', border: '1px solid #e1e4e8', padding: '20px', borderRadius: '6px', marginTop: '20px' }}>
                        <h3 style={{ marginTop: 0, color: '#0366d6' }}>🔹 Proprietary Domain-Specific Machine Learning Models</h3>
                        <p style={{ lineHeight: '1.6' }}>
                            I build proprietary, domain-specific machine learning models that are application and industry-specific 
                            based on published scientific journals and models designed for highly sensitive industries and mission-critical applications.
                        </p>
                        
                        <h4 style={{ marginBottom: '8px', color: '#24292e' }}>⚡ Engineering Constraints Handled:</h4>
                        <ul style={{ paddingLeft: '20px', lineHeight: '1.6' }}>
                            <li><strong>Time-Sensitivity:</strong> Execution constraints mapped to tight data windows.</li>
                            <li><strong>Low-Latency Architecture:</strong> Performance-optimized runtimes to satisfy strict execution bounds.</li>
                            <li><strong>Rapid Lifecycle:</strong> Very short conceptualization-to-development-to-market timeframes.</li>
                        </ul>
                    </div>
                </div>
            );
        }

        function PublicationsPage() {
            return (
                <div>
                    <h2>📝 Publications & Research</h2>
                    <p>Here you will find documentation, academic references, and deep-dives into technical designs.</p>
                    <ul>
                        <li><strong>Low-Latency System Architectures (2026):</strong> An analysis of constraint handling under rapid development lifecycles.</li>
                    </ul>
                </div>
            );
        }

        function TeachingPage() {
            return (
                <div>
                    <h2>🎓 Teaching & Mentorship</h2>
                    <p>Documentation and training structures created to guide onboarding developers and teams.</p>
                    <ul>
                        <li>CI/CD Workflow Operations — Internal standardizations and testing metrics frameworks.</li>
                    </ul>
                </div>
            );
        }
        function ContactPage() {
            return (
                <div>
                    <h2>🎓 Contact </h2>
                    <p>How can you reach out to me</p>
                    <ul>
                        <li>CI/CD Workflow Operations — Internal standardizations and testing metrics frameworks.</li>
                    </ul>
                </div>
            );
        }

        // --- 2. MAIN APP COMPONENT (Manages Navigation & State) ---

        function App() {
            const [currentPage, setCurrentPage] = React.useState('home');

            const navLinkStyle = (pageName) => ({
                padding: '10px 20px',
                marginRight: '10px',
                cursor: 'pointer',
                backgroundColor: currentPage === pageName ? '#0366d6' : '#f6f8fa',
                color: currentPage === pageName ? '#fff' : '#24292e',
                border: '1px solid #e1e4e8',
                borderRadius: '6px',
                fontWeight: 'bold',
                transition: 'all 0.2s'
            });

            const renderPage = () => {
                switch(currentPage) {
                    case 'home': return <HomePage />;
                    case 'projects': return <ProjectsPage />;
                    case 'publications': return <PublicationsPage />;
                    case 'teaching': return <TeachingPage />;
                    case 'contact': return <ContactPage/>;
                    default: return <HomePage />;
                }
            };

            return (
                <div style={{ maxWidth: '850px', margin: '40px auto', fontFamily: 'system-ui, -apple-system, sans-serif', padding: '0 20px', color: '#333' }}>
                    
                    <header style={{ marginBottom: '30px' }}>
                        <h1 style={{ fontSize: '2.2rem', marginBottom: '5px' }}>benjaminyzg's github project repository</h1>
                        <p style={{ color: '#666', margin: '0' }}>Centralized Documentation Hub</p>
                    </header>

                    <nav style={{ borderBottom: '2px solid #eaecef', paddingBottom: '15px', marginBottom: '30px' }}>
                        <button style={navLinkStyle('home')} onClick={() => setCurrentPage('home')}>Overview</button>
                        <button style={navLinkStyle('projects')} onClick={() => setCurrentPage('projects')}>Projects</button>
                        <button style={navLinkStyle('publications')} onClick={() => setCurrentPage('publications')}>Publications</button>
                        <button style={navLinkStyle('teaching')} onClick={() => setCurrentPage('teaching')}>Teaching</button>
                        <button style={navLinkStyle('contact')} onClick={() => setCurrentPage('contact')}>Teaching</button>
                    </nav>

                    <main style={{ minHeight: '300px', lineHeight: '1.6' }}>
                        {renderPage()}
                    </main>

                    <footer style={{ marginTop: '50px', borderTop: '1px solid #eee', paddingTop: '15px', fontSize: '14px', color: '#888' }}>
                        © 2026 benjaminyzg. Built seamlessly with React.
                    </footer>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>
</html>
