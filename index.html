<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Project Pages</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; }
        #content { background: #f9f9f9; padding: 20px; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Project Documentation</h1>
    <hr>
    <div id="content">Loading documentation...</div>

    <script>
        // Fetch your README.md file (relative path if it's in the same repository folder)
        fetch('README.md')
            .then(response => {
                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }
                return response.text();
            })
            .then(markdownText => {
                // Convert the Markdown text into HTML and insert it into the div
                document.getElementById('content').innerHTML = marked.parse(markdownText);
            })
            .catch(error => {
                console.error('Error fetching the README:', error);
                document.getElementById('content').innerHTML = 'Failed to load documentation.';
            });
    </script>

</body>
</html>
