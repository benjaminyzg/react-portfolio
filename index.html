<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>benjaminyzg's Portfolio Hub</title>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        // --- 1. DEFINE YOUR INDIVIDUAL PAGES ---

        function HomePage() {
            return (
                <div>
                    <h2>🏠 Welcome & Overview</h2>
                    <p>Hi there, I'm Benjamin 👋 Welcome to my GitHub profile hub!</p>
                    <p>I am a passionate developer focused on building innovative, low-latency architectures and utilizing structured CI/CD environments for software delivery.</p>
                </div>
            );
        }

        function ProjectsPage() {
            return (
                <div>
                    <h2>🚀 Projects Portfolio</h2>
                    <p>This section showcases my engineering work and proprietary software builds.</p>
                    <div style={{ background: '#f9f9f9', padding: '15px', borderRadius: '5px', marginBottom: '15px' }}>
                        <h3>🔹 Domain-Specific Machine Learning Models</h3>
                        <p>Constructing mission-critical applications optimized for high-sensitivity fields with strict low-latency constraints.</p>
                    </div>
                </div>
            );
        }

        function PublicationsPage() {
            return (
                <div>
                    <h2>📝 Publications & Research</h2>
                    <p>Here you will find documentation, academic references, and deep-dives into technical designs.</p>
                    <ul>
                        <li><strong>Low-Latency System Architectures (2026):</strong> An analysis of constraint handling under rapid development lifecycles.</li>
                    </ul>
                </div>
            );
        }

        function TeachingPage() {
            return (
                <div>
                    <h2>🎓 Teaching & Mentorship</h2>
                    <p>Documentation and training structures created to guide onboarding developers and teams.</p>
                    <ul>
                        <li>CI/CD Workflow Operations — Internal standardizations and testing metrics frameworks.</li>
                    </ul>
                </div>
            );
        }


        // --- 2. MAIN APP COMPONENT (Manages Navigation & State) ---

        function App() {
            // "currentPage" keeps track of which page is active. Defaults to 'home'
            const [currentPage, setCurrentPage] = React.useState('home');

            // Navigation Button Styling
            const navLinkStyle = (pageName) => ({
                padding: '10px 20px',
                marginRight: '10px',
                cursor: 'pointer',
                backgroundColor: currentPage === pageName ? '#0366d6' : '#f6f8fa',
                color: currentPage === pageName ? '#fff' : '#24292e',
                border: '1px solid #e1e4e8',
                borderRadius: '6px',
                fontWeight: 'bold',
                transition: 'all 0.2s'
            });

            // Helper function to decide which sub-page component to render
            const renderPage = () => {
                switch(currentPage) {
                    case 'home': return <HomePage />;
                    case 'projects': return <ProjectsPage />;
                    case 'publications': return <PublicationsPage />;
                    case 'teaching': return <TeachingPage />;
                    default: return <HomePage />;
                }
            };

            return (
                <div style={{ maxWidth: '850px', margin: '40px auto', fontFamily: 'system-ui, -apple-system, sans-serif', padding: '0 20px', color: '#333' }}>
                    
                    {/* Header Site Identity */}
                    <header style={{ marginBottom: '30px' }}>
                        <h1 style={{ fontSize: '2.2rem', marginBottom: '5px' }}>benjaminyzg's github project repository</h1>
                        <p style={{ color: '#666', margin: '0' }}>Centralized Documentation Hub</p>
                    </header>

                    {/* Navigation Bar */}
                    <nav style={{ borderBottom: '2px solid #eaecef', paddingBottom: '15px', marginBottom: '30px' }}>
                        <button style={navLinkStyle('home')} onClick={() => setCurrentPage('home')}>Overview</button>
                        <button style={navLinkStyle('projects')} onClick={() => setCurrentPage('projects')}>Projects</button>
                        <button style={navLinkStyle('publications')} onClick={() => setCurrentPage('publications')}>Publications</button>
                        <button style={navLinkStyle('teaching')} onClick={() => setCurrentPage('teaching')}>Teaching</button>
                    </nav>

                    {/* Dynamic Page Content Injector */}
                    <main style={{ minHeight: '300px', lineHeight: '1.6' }}>
                        {renderPage()}
                    </main>

                    {/* Footer */}
                    <footer style={{ marginTop: '50px', borderTop: '1px solid #eee', paddingTop: '15px', fontSize: '14px', color: '#888' }}>
                        © 2026 benjaminyzg. Built seamlessly with React.
                    </footer>

                </div>
            );
        }

        // Render application to root element
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>

</body>
</html>
